name: Deploy Docs

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - '*'

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Packages/com.kibalab.kibamaterialgui/Website~
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Packages/com.kibalab.kibamaterialgui/Website~/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Docs
        run: npm run docs:build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: Packages/com.kibalab.kibamaterialgui/Website~/build
          publish_branch: gh-pages
