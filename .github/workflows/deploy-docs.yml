name: Deploy website

on:
  workflow_dispatch:
  push:
    branches:
      - release
    tags:
      - '*'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      allowed: ${{ steps.guard.outputs.allowed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Allow only release branch refs
        id: guard
        shell: bash
        run: |
          git fetch origin +refs/heads/release:refs/remotes/origin/release

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.ref_name }}" = "release" ]; then
              echo "allowed=true" >> "$GITHUB_OUTPUT"
            else
              echo "Docs workflow_dispatch must run from the release branch."
              echo "allowed=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          if [ "${GITHUB_REF}" = "refs/heads/release" ]; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]] && git merge-base --is-ancestor "${GITHUB_SHA}" "origin/release"; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Docs deployment only runs for the release branch or tags contained in origin/release."
            echo "allowed=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build website
    needs: guard
    if: needs.guard.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    env:
      DOCUSAURUS_URL: https://${{ github.repository_owner }}.github.io
      DOCUSAURUS_BASE_URL: /${{ github.event.repository.name }}/
      DOCUSAURUS_REPOSITORY_URL: https://github.com/${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Packages/com.kibalab.kibamaterialgui/Website~/package-lock.json

      - name: Install dependencies
        working-directory: Packages/com.kibalab.kibamaterialgui/Website~
        run: npm ci

      - name: Build
        working-directory: Packages/com.kibalab.kibamaterialgui/Website~
        run: npm run docs:build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Packages/com.kibalab.kibamaterialgui/Website~/build

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
