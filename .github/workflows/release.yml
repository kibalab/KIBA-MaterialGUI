name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      allowed: ${{ steps.guard.outputs.allowed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Allow only release branch refs
        id: guard
        shell: bash
        run: |
          git fetch origin +refs/heads/release:refs/remotes/origin/release

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.ref_name }}" = "release" ]; then
              echo "allowed=true" >> "$GITHUB_OUTPUT"
            else
              echo "Release workflow_dispatch must run from the release branch."
              echo "allowed=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          if [[ "${GITHUB_REF}" == refs/tags/* ]] && git merge-base --is-ancestor "${GITHUB_SHA}" "origin/release"; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Release tags must point to commits contained in origin/release."
            echo "allowed=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: guard
    if: needs.guard.outputs.allowed == 'true'
    uses: kibalab/vpm-package-template/.github/workflows/vpm-release.yml@main
    with:
      package_name: ${{ vars.PACKAGE_NAME || 'com.kibalab.kibamaterialgui' }}
      vpm_backend_url: ${{ vars.VPM_BACKEND_URL || 'https://vpm.kiba.red' }}
    secrets:
      VPM_API_KEY: ${{ secrets.VPM_API_KEY }}
